<script src="main.js"></script>
<script>
  var squaresClicked = () => {};

  function loadHome() {

    const grid = document.getElementById("grid");
    let dragged = null;
    let lastGame = null;
    let lastGamePath = null;

    squaresClicked = function(elementId, gamePath) {
      const oldPositions = getPositions();
      var isVisible = $(".playable-card").is(":visible");
      const squaresSection = document.getElementsByClassName("playable-card")[0];

      if (lastGame && lastGame !== elementId) {
        $("#" + lastGame).removeClass("fa-pause");
        $("#" + lastGame).addClass("fa-play");
      }

      if (isVisible && (!lastGamePath || lastGamePath === gamePath)) {
        $("#" + elementId).removeClass("fa-pause");
        $("#" + elementId).addClass("fa-play");

        squaresSection.style.display = "none";
      } else {
        $("#" + elementId).removeClass("fa-play");
        $("#" + elementId).addClass("fa-pause");

        squaresSection.style.display = "block";
        squaresSection.src = gamePath + "/index.html";
        lastGamePath = gamePath;
        lastGame = elementId;
      }

      animateMovement(oldPositions);
    }

    function getPositions() {
      const positions = new Map();
      grid.querySelectorAll(".card").forEach((card) => {
        positions.set(card, card.getBoundingClientRect());
      });
      return positions;
    }

    function animateMovement(oldPositions) {
      grid.querySelectorAll(".card").forEach((card) => {
        const old = oldPositions.get(card);
        const newPos = card.getBoundingClientRect();

        const dx = old.left - newPos.left;
        const dy = old.top - newPos.top;

        if (dx || dy) {
          card.style.transform = `translate(${dx}px, ${dy}px)`;
          card.style.transition = "transform 0s";

          requestAnimationFrame(() => {
            card.style.transform = "";
            card.style.transition = "transform 0.5s ease";
          });
        }
      });
    }

    grid.querySelectorAll(".card").forEach((card) => {
      card.addEventListener("dragstart", (e) => {
        dragged = card;
        card.classList.add("dragging");
      });

      card.addEventListener("dragend", () => {
        card.classList.remove("dragging");
        dragged = null;
      });

      card.addEventListener("dragover", (e) => {
        e.preventDefault();
      });

      card.addEventListener("drop", (e) => {
        e.preventDefault();

        if (!dragged || dragged === card) return;

        const oldPositions = getPositions();

        const children = Array.from(grid.children);
        const draggedIndex = children.indexOf(dragged);
        const targetIndex = children.indexOf(card);

        if (draggedIndex < targetIndex) {
          grid.insertBefore(dragged, card.nextSibling);
        } else {
          grid.insertBefore(dragged, card);
        }

        animateMovement(oldPositions);
      });
    });
  }

  loadHome();
</script>
